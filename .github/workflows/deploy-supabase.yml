name: Deploy Supabase (DB + Edge Functions)

# CD for the privileged backend. On push to main that touches supabase/, this
# links the hosted project, pushes migrations, and deploys the Edge Functions.
#
# One-time setup in repo Settings → Secrets and variables → Actions:
#   SUPABASE_ACCESS_TOKEN   personal access token (Supabase dashboard → Account → Access Tokens)
#   SUPABASE_PROJECT_REF    your project ref (the <ref> in https://<ref>.supabase.co)
#   SUPABASE_DB_PASSWORD    the database password (Settings → Database)
#
# Edge Function runtime secrets (AES_KEY, CHAIN_RPC_URL, ANCHOR_SIGNER_KEY,
# RBAC_CONTRACT_ADDRESS, ANCHOR_CONTRACT_ADDRESS) are NOT set here — set them
# once with `supabase secrets set ...` or in the dashboard so they never touch
# CI logs or git.
#
# Until the three repo secrets above are present the job exits green with a
# warning (it does not fail your pipeline).

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Push migrations + deploy functions
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy secrets are present
        id: guard
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$PROJECT_REF" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::warning::Supabase deploy secrets not set — skipping deploy. Add SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF and SUPABASE_DB_PASSWORD in repo settings."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Supabase CLI
        if: steps.guard.outputs.ready == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        if: steps.guard.outputs.ready == 'true'
        run: supabase link --project-ref "$PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push database migrations
        if: steps.guard.outputs.ready == 'true'
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy Edge Functions
        if: steps.guard.outputs.ready == 'true'
        run: supabase functions deploy --project-ref "$PROJECT_REF"
